<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <title>Student Login | ENG NOUR SHEHAB MATH CAPSULE</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at 10% 20%, #0b1120, #0f172a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 2.5rem;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .logo{
            font-size: 1.3rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        h2{
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
            color: white;
            text-align: center;
        }
        .sub{
            color: #94a3b8;
            text-align: center;
            margin-bottom: 1.8rem;
            font-size: 0.9rem;
        }
        .form-group{margin-bottom: 1.2rem}
        label{display:block;font-weight:500;margin-bottom:0.4rem;color:#cbd5e1}
        input{
            width:100%;
            padding:0.8rem;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 32px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        input:focus{
            border-color: #38bdf8;
            box-shadow: 0 0 8px rgba(56,189,248,0.3);
        }
        button{
            width:100%;
            padding:0.8rem;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }
        button:hover{background:#0284c7}
        .toggle{
            text-align: center;
            margin-top: 1rem;
            color: #38bdf8;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .message{
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 32px;
            text-align: center;
        }
        .error{background:#450a0a; color:#f87171}
        .success{background:#064e3b; color:#4ade80}
        a{
            color: #64748b;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
        }
    </style>
    <script src="/api-base.js"></script>
</head>
<body>
    <div class="card">
        <div class="logo">📐 MATH CAPSULE</div>
        <h2 id="formTitle">Student Login</h2>
        <div class="sub" id="modeDesc">Enter your unique code & password</div>
        <div class="form-group"><label>🔑 Unique Code</label><input type="text" id="code" autocomplete="off"></div>
        <div id="passwordGroup" class="form-group"><label>🔒 Password</label><input type="password" id="password"></div>
        <div id="newPasswordGroup" class="form-group" style="display:none"><label>🔒 New Password (min 4 chars)</label><input type="password" id="newPassword"></div>
        <button id="actionBtn">Login</button>
        <div id="message"></div>
        <div class="toggle" id="toggleBtn">First time? Setup your password</div>
        <a href="/">← Back to Home</a>
    </div>
    <script>
        let isSetup = false;
        const toggleBtn = document.getElementById('toggleBtn');
        const formTitle = document.getElementById('formTitle');
        const modeDesc = document.getElementById('modeDesc');
        const passwordGroup = document.getElementById('passwordGroup');
        const newPasswordGroup = document.getElementById('newPasswordGroup');
        const actionBtn = document.getElementById('actionBtn');
        const codeInput = document.getElementById('code');
        const passwordInput = document.getElementById('password');
        const newPasswordInput = document.getElementById('newPassword');
        const messageDiv = document.getElementById('message');

        function showMessage(text, isError) {
            messageDiv.innerHTML = `<div class="message ${isError ? 'error' : 'success'}">${text}</div>`;
            setTimeout(() => { if(messageDiv.innerHTML.includes(text)) messageDiv.innerHTML = ''; }, 4000);
        }

        toggleBtn.onclick = () => {
            isSetup = !isSetup;
            if(isSetup) {
                formTitle.innerText = 'Setup Password';
                modeDesc.innerText = 'Create a password for your account';
                passwordGroup.style.display = 'none';
                newPasswordGroup.style.display = 'block';
                actionBtn.innerText = 'Setup Password';
                toggleBtn.innerText = 'Already have password? Login';
            } else {
                formTitle.innerText = 'Student Login';
                modeDesc.innerText = 'Enter your unique code & password';
                passwordGroup.style.display = 'block';
                newPasswordGroup.style.display = 'none';
                actionBtn.innerText = 'Login';
                toggleBtn.innerText = 'First time? Setup password';
            }
        };

        async function handleAction() {
            const code = codeInput.value.trim();
            if(!code) return showMessage('Enter your unique code', true);
            if(isSetup) {
                const newPwd = newPasswordInput.value;
                if(!newPwd || newPwd.length < 4) return showMessage('Password must be at least 4 characters', true);
                const res = await apiFetch('/api/auth/setup-password', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ code, password: newPwd })
                });

                let data;
                try {
                    data = await res.json();
                } catch (parseErr) {
                    const text = await res.text();
                    data = { error: text || 'Invalid JSON response from server' };
                }

                if(res.ok) {
                    showMessage('Password set! Please login now.', false);
                    isSetup = false;
                    toggleBtn.click();
                    codeInput.value = '';
                    newPasswordInput.value = '';
                } else showMessage(data.error || 'Setup failed', true);
            } else {
                const password = passwordInput.value;
                if(!password) return showMessage('Enter your password', true);
                const res = await apiFetch('/api/auth/login', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ code, password })
                });

                let data;
                try {
                    data = await res.json();
                } catch (parseErr) {
                    const text = await res.text();
                    data = { error: text || 'Invalid JSON response from server' };
                }

                if(res.ok) {
                    localStorage.setItem('token', data.token);
                    window.location.href = '/watch';
                } else showMessage(data.error || 'Login failed', true);
            }
        }
        actionBtn.onclick = handleAction;
        [codeInput, passwordInput, newPasswordInput].forEach(inp => inp.addEventListener('keypress', e => { if(e.key === 'Enter') handleAction(); }));
    </script>
</body>
</html>
