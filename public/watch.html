<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <title>Watch | ENG NOUR SHEHAB MATH CAPSULE</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none}
        body{background:#0a0f1c;font-family:'Inter',system-ui,sans-serif}
        .top-bar{
            background: #0f172a;
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
        }
        .logo{
            font-weight: 800;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .top-bar a{
            color: #94a3b8;
            text-decoration: none;
            margin-left: 1.5rem;
        }
        .video-container{
            max-width: 1100px;
            margin: 2rem auto;
            background: #000;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #1e293b;
        }
        .video-wrapper{position:relative;width:100%;padding-bottom:56.25%}
        .video-wrapper iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
        #playerContainer{position:absolute;top:0;left:0;width:100%;height:100%;}
        .youtube-blocker{position:absolute;inset:0;z-index:24;pointer-events:none;}
        .youtube-blocker-edge{position:absolute;background:transparent;pointer-events:all;}
        .youtube-blocker-edge.top{top:0;left:0;width:100%;height:22%;}
        .youtube-blocker-edge.bottom{bottom:0;left:0;width:100%;height:22%;}
        .youtube-blocker-edge.left{top:22%;left:0;width:22%;height:56%;}
        .youtube-blocker-edge.right{top:22%;right:0;width:22%;height:56%;}
        .player-frame{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;}
        .player-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);z-index:20;}
        .player-overlay button{background:#38bdf8;border:none;color:#0f172a;font-size:1rem;font-weight:700;padding:0.9rem 1.8rem;border-radius:999px;cursor:pointer;box-shadow:0 15px 30px rgba(56,189,248,0.25);transition:transform 0.2s ease,filter 0.2s ease;}
        .player-overlay button:hover{transform:translateY(-2px);filter:brightness(1.05);}
        .video-wrapper .fullscreen-btn{position:absolute;top:16px;right:16px;z-index:30;}
        .video-wrapper .player-watermark{position:absolute;top:16px;left:16px;z-index:40;pointer-events:none;}
        .folder-card{width:100%;background:#09101d;border:1px solid #0f172a;border-radius:16px;padding:0.9rem;margin-bottom:0.85rem;}
        .folder-header{display:flex;align-items:center;justify-content:space-between;gap:1rem;cursor:pointer;}
        .folder-title{color:#e2e8f0;font-weight:700;font-size:0.98rem;}
        .folder-meta{color:#94a3b8;font-size:0.85rem;}
        .folder-toggle{background:transparent;border:1px solid #334155;color:#cbd5e1;padding:0.35rem 0.9rem;border-radius:999px;cursor:pointer;transition:all 0.2s;}
        .folder-toggle:hover{border-color:#38bdf8;color:#38bdf8;}
        .folder-content{margin-top:0.75rem;display:none;}
        .folder-empty{color:#94a3b8;font-size:0.9rem;padding:0.75rem 0.5rem;background:#0b1524;border-radius:12px;}
        .video-wrapper:fullscreen, .video-wrapper:-webkit-full-screen{padding-bottom:0;height:100%;width:100%;max-width:none;max-height:none;border-radius:0;}
        .video-wrapper:fullscreen #playerContainer, .video-wrapper:-webkit-full-screen #playerContainer{height:100%;}
        .video-wrapper:fullscreen .player-overlay, .video-wrapper:-webkit-full-screen .player-overlay{position:absolute;top:0;left:0;width:100%;height:100%;}
        .video-wrapper:fullscreen .player-watermark, .video-wrapper:-webkit-full-screen .player-watermark{position:fixed;top:20px;left:20px;}
        .info-bar{
            background: #0f172a;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .video-title{color:#f1f5f9;font-weight:600}
        .material-link{color:#a5f3fc;font-size:0.95rem;margin-top:0.4rem;}
        .material-link a{color:#38bdf8;text-decoration:none;}
        .material-link a:hover{text-decoration:underline;}
        .views-info{
            background: #0ea5e9;
            padding: 0.3rem 1rem;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .btn-outline{
            background: transparent;
            border: 1px solid #334155;
            color: #cbd5e1;
            padding: 0.4rem 1rem;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-outline:hover{
            border-color: #38bdf8;
            color: #38bdf8;
        }
        .tab-bar{
            display:flex;
            gap:0.5rem;
            justify-content:center;
            padding:1rem 2rem;
            background:#0f172a;
            border-bottom:1px solid #1e293b;
        }
        .tab-button{
            background:transparent;
            border:1px solid #334155;
            color:#cbd5e1;
            padding:0.65rem 1.2rem;
            border-radius:999px;
            cursor:pointer;
            font-weight:700;
            transition:all 0.2s;
        }
        .tab-button.active,
        .tab-button:hover{
            border-color:#38bdf8;
            color:#38bdf8;
        }
        .quiz-panel{
            max-width:1100px;
            margin:2rem auto;
            padding:1rem;
            background:#0f172a;
            border:1px solid #1e293b;
            border-radius:32px;
            box-shadow:0 20px 40px rgba(0,0,0,0.5);
        }
        .quiz-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
            gap:1rem;
        }
        .quiz-card{
            background:#071022;
            border:1px solid #0f172a;
            border-radius:16px;
            padding:1rem;
            display:flex;
            flex-direction:column;
            gap:0.75rem;
        }
        .quiz-card h3{
            color:#e2e8f0;
            margin-bottom:0.25rem;
            font-size:1rem;
        }
        .quiz-card p{
            color:#94a3b8;
            line-height:1.4;
            font-size:0.92rem;
        }
        .quiz-card small{
            color:#64748b;
            font-size:0.78rem;
        }
        .quiz-card a,
        .quiz-card button{
            color:#38bdf8;
        }
        .quiz-card button{
            background:transparent;
            border:1px solid #334155;
            border-radius:999px;
            padding:0.6rem 1rem;
            cursor:pointer;
            width:max-content;
            transition:all 0.2s;
        }
        .quiz-card button:hover{
            border-color:#38bdf8;
            color:#7dd3fc;
        }
        .quiz-info-panel{
            margin-top:1rem;
            background:#071022;
            border:1px solid #0f172a;
            border-radius:16px;
            padding:1rem;
            color:#cbd5e1;
        }
        .quiz-info-panel h3{
            margin-bottom:0.5rem;
            color:#e2e8f0;
        }
        .quiz-info-panel p{
            margin-bottom:1rem;
            line-height:1.6;
        }
        .quiz-info-panel a{
            color:#38bdf8;
            text-decoration:none;
        }
        .quiz-info-panel a:hover{
            text-decoration:underline;
        }
        .quiz-info-panel button{
            background: #3b82f6;
            border: none;
            color: #ffffff;
            padding: 0.95rem 1.6rem;
            border-radius: 999px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.75rem;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .quiz-info-panel button:hover{
            background: #2563eb;
            transform: translateY(-1px);
        }
        .change-password-panel{
            display: none;
            background: #0f172a;
            border-top: 1px solid #1e293b;
            padding: 1.25rem 2rem;
            gap: 1rem;
        }
        .change-password-panel.active{display: flex;}
        .change-password-panel .form-row{
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .change-password-panel label{
            color: #cbd5e1;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .change-password-panel input{
            width: 100%;
            padding: 0.85rem 1rem;
            background: #071022;
            border: 1px solid #334155;
            border-radius: 20px;
            color: #e2e8f0;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .change-password-panel input:focus{
            border-color: #38bdf8;
            box-shadow: 0 0 12px rgba(56,189,248,0.18);
        }
        .change-password-message{
            font-size: 0.95rem;
            min-height: 1.3rem;
        }
        .change-password-message.error{color: #f87171;}
        .change-password-message.success{color: #4ade80;}
        .watermark{
            position: fixed;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            color: #38bdf8;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            font-family: monospace;
            z-index: 1000;
            pointer-events: none;
            letter-spacing: 0.5px;
            border: 1px solid rgba(56,189,248,0.3);
            transition: all 0.3s ease;
        }
        .corner-tl{top:20px;left:20px}
        .corner-tr{top:20px;right:20px}
        .corner-bl{bottom:20px;left:20px}
        .corner-br{bottom:20px;right:20px}
        .player-controls{
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.8);
            padding: 0.75rem 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            z-index: 25;
            opacity: 0;
            transition: opacity 0.2s ease;
            flex-wrap: wrap;
            pointer-events: none;
        }
        .player-controls.visible{
            opacity: 1;
            pointer-events: auto;
        }
        .iframe-blocker{
            position: absolute;
            inset: 0;
            z-index: 20;
            pointer-events: auto;
            background: transparent;
            display: none;
        }
        .seek-group{
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
        }
        .seek-slider{
            flex: 1;
            appearance: none;
            height: 6px;
            border-radius: 999px;
            background: #334155;
            outline: none;
            cursor: pointer;
        }
        .seek-slider::-webkit-slider-thumb,
        .seek-slider::-moz-range-thumb{
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #38bdf8;
            border: none;
            cursor: pointer;
        }
        .time-label{
            color: #cbd5e1;
            font-size: 0.85rem;
            min-width: 42px;
            text-align: center;
        }
        .control-group{
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .control-label{
            color: #cbd5e1;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .control-select{
            background: #1e293b;
            border: 1px solid #334155;
            color: #cbd5e1;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .control-select:hover{
            border-color: #38bdf8;
            color: #38bdf8;
        }
        @media(max-width:640px){
            .watermark{font-size:10px;padding:4px 12px}
            .info-bar{flex-direction:column;align-items:flex-start}
            .change-password-panel{padding:1rem}
            .player-controls{padding:0.5rem}
            .control-label{font-size:0.7rem}
            .control-select{font-size:0.75rem}
        }
    </style>
    <script src="/api-base.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
    <div class="top-bar">
        <div class="logo">📐 ENG NOUR SHEHAB | MATH CAPSULE</div>
        <div><a href="/about">About</a><a href="/student" id="logoutLink">Logout</a></div>
    </div>
    <div class="tab-bar">
        <button id="watchTabBtn" class="tab-button active">Watch</button>
        <button id="quizTabBtn" class="tab-button">Quizzes</button>
    </div>
    <div class="video-container" id="watchPanel">
        <div id="videosList" style="padding:1rem;display:flex;gap:1rem;flex-wrap:wrap;background:#071022;border-bottom:1px solid #0f172a"></div>
        <div class="video-wrapper player-wrapper" id="playerWrapper">
            <div id="playerContainer"></div>
            <div class="player-controls" id="playerControls">
                <div class="control-group">
                    <label class="control-label">Speed</label>
                    <select id="speedControl" class="control-select">
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1" selected>1x (Normal)</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="1.75">1.75x</option>
                        <option value="2">2x</option>
                    </select>
                </div>
                <div class="control-group seek-group">
                    <span class="time-label" id="currentTimeLabel">0:00</span>
                    <input type="range" id="seekBar" class="seek-slider" min="0" max="100" value="0" step="1">
                    <span class="time-label" id="durationLabel">0:00</span>
                </div>
                <div class="control-group">
                    <label class="control-label">Volume</label>
                    <input type="range" id="volumeSlider" class="seek-slider" min="0" max="100" value="100" step="1">
                </div>
                <button class="btn-outline" id="volumeBtn">Mute</button>
                <button class="btn-outline" id="playPauseBtn">Play/Pause</button>
                <button class="btn-outline" id="rewindBtn">-10s</button>
                <button class="btn-outline" id="forwardBtn">+10s</button>
            </div>
        </div>
        <div class="info-bar">
            <div>
            <div class="video-title" id="videoTitle">Loading lesson...</div>
            <div id="materialLinkContainer" class="material-link"></div>
        </div>
            <div class="views-info" id="viewsInfo">🎬 Views: --</div>
            <button class="btn-outline" id="changePwdBtn">Change Password</button>
        </div>
        <div class="change-password-panel" id="changePwdForm">
            <div class="form-row">
                <label for="currentPassword">Current Password</label>
                <input type="password" id="currentPassword" autocomplete="current-password" placeholder="Enter current password">
            </div>
            <div class="form-row">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" autocomplete="new-password" placeholder="Enter new password (min 4 chars)">
            </div>
            <button class="btn-outline" id="submitChangePwdBtn">Save Password</button>
            <div class="change-password-message" id="changePwdMessage"></div>
        </div>
    </div>

    <div class="quiz-panel" id="quizPanel" style="display:none;">
        <div id="quizzesList" class="quiz-grid"></div>
        <div class="quiz-info-panel" id="quizInfoPanel" style="display:none;"></div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if(!token) window.location.href = '/student';
        let username = '', allocations = {}, viewConsumed = false, watermarkInterval = null;

        function parseJWT(t){
            try{return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')))}catch(e){return null}
        }
        const user = parseJWT(token);
        if(!user || user.role !== 'student') { localStorage.removeItem('token'); window.location.href = '/student'; }
        username = user.username;
        refreshStudentInfo();

        // Rotating watermark and fullscreen button
        const videoWrapper = document.getElementById('playerWrapper');
        const watermark = document.createElement('div');
        watermark.className = 'watermark corner-tl';
        watermark.textContent = `🧪 ${username} | MATH CAPSULE`;
        videoWrapper.appendChild(watermark);

        const fullscreenBtn = document.createElement('button');
        fullscreenBtn.id = 'fullscreenBtn';
        fullscreenBtn.className = 'btn-outline fullscreen-btn';
        fullscreenBtn.innerText = 'Fullscreen';
        fullscreenBtn.onclick = toggleFullscreen;
        videoWrapper.appendChild(fullscreenBtn);

        const corners = ['corner-tl','corner-tr','corner-bl','corner-br'];
        let idx = 0;
        watermarkInterval = setInterval(() => { idx = (idx+1)%4; watermark.className = `watermark ${corners[idx]}`; }, 30000);

        function getFullscreenElement() {
            return document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
        }

        function requestFullscreen(element) {
            if (!element) return Promise.resolve();
            if (element.requestFullscreen) return element.requestFullscreen();
            if (element.webkitRequestFullscreen) return element.webkitRequestFullscreen();
            if (element.mozRequestFullScreen) return element.mozRequestFullScreen();
            if (element.msRequestFullscreen) return element.msRequestFullscreen();
            const iframe = element.querySelector('iframe');
            if (iframe && typeof iframe.webkitEnterFullscreen === 'function') {
                iframe.webkitEnterFullscreen();
                return Promise.resolve();
            }
            return Promise.reject(new Error('Fullscreen not supported'));
        }

        function exitFullscreen() {
            if (document.exitFullscreen) return document.exitFullscreen();
            if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
            if (document.mozCancelFullScreen) return document.mozCancelFullScreen();
            if (document.msExitFullscreen) return document.msExitFullscreen();
            return Promise.reject(new Error('Exit fullscreen not supported'));
        }

        function toggleFullscreen() {
            if (!getFullscreenElement()) {
                requestFullscreen(videoWrapper).catch(() => {
                    const iframe = document.querySelector('#playerContainer iframe');
                    if (iframe && typeof iframe.webkitEnterFullscreen === 'function') {
                        iframe.webkitEnterFullscreen();
                    }
                });
            } else {
                exitFullscreen().catch(() => {});
            }
        }

        document.addEventListener('fullscreenchange', () => {
            fullscreenBtn.innerText = getFullscreenElement() === videoWrapper ? 'Exit Fullscreen' : 'Fullscreen';
        });

        // Anti-copy measures
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if(e.key === 'F12' || (e.ctrlKey && (e.key === 'u'||e.key === 's'||e.key === 'I'))) e.preventDefault();
        });

        async function refreshStudentInfo() {
            const res = await apiFetch('/api/student/me', { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
                const data = await res.json();
                allocations = {};
                (data.perVideoViews || []).forEach(item => {
                    allocations[item.video] = item.views || 0;
                });
                document.getElementById('viewsInfo').innerText = '🎬 Views are assigned per lesson';
            }
        }

        function renderFolderSection(folder, level) {
            const wrapper = document.createElement('div');
            wrapper.className = 'folder-card';
            wrapper.style.paddingLeft = `${level * 14}px`;

            const header = document.createElement('div');
            header.className = 'folder-header';

            const titleBlock = document.createElement('div');
            const title = document.createElement('div');
            title.className = 'folder-title';
            title.textContent = folder.name || 'Unnamed Folder';
            const meta = document.createElement('div');
            meta.className = 'folder-meta';
            const itemCount = (Array.isArray(folder.videos) ? folder.videos.length : 0) + (Array.isArray(folder.children) ? folder.children.length : 0);
            meta.textContent = itemCount > 0 ? `${itemCount} item${itemCount === 1 ? '' : 's'}` : 'Empty folder';
            titleBlock.appendChild(title);
            titleBlock.appendChild(meta);

            const toggle = document.createElement('button');
            toggle.className = 'folder-toggle';
            toggle.textContent = 'View';

            header.appendChild(titleBlock);
            header.appendChild(toggle);
            wrapper.appendChild(header);

            const content = document.createElement('div');
            content.className = 'folder-content';
            content.style.display = 'none';
            content.style.paddingTop = '0.75rem';

            if (Array.isArray(folder.videos) && folder.videos.length > 0) {
                const row = document.createElement('div');
                row.style.display = 'flex';
                row.style.flexWrap = 'wrap';
                row.style.gap = '1rem';
                folder.videos.forEach(video => row.appendChild(renderVideoCard(video)));
                content.appendChild(row);
            }

            if (Array.isArray(folder.children) && folder.children.length > 0) {
                folder.children.forEach(child => content.appendChild(renderFolderSection(child, level + 1)));
            }

            if (content.children.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'folder-empty';
                empty.textContent = 'This folder has no lessons yet.';
                content.appendChild(empty);
            }

            header.onclick = () => {
                const visible = content.style.display === 'block';
                content.style.display = visible ? 'none' : 'block';
                toggle.textContent = visible ? 'View' : 'Hide';
            };

            wrapper.appendChild(content);
            return wrapper;
        }

        async function loadVideos() {
            const res = await apiFetch('/api/student/folders', { headers: { 'Authorization': `Bearer ${token}` } });
            const container = document.getElementById('videosList');
            container.innerHTML = '';
            if(!res.ok) {
                const error = document.createElement('div');
                error.style.color = '#f87171';
                error.textContent = 'Unable to load lessons. Please refresh.';
                container.appendChild(error);
                return;
            }
            const data = await res.json();
            if (!Array.isArray(data.folders) || data.folders.length === 0) {
                const empty = document.createElement('div');
                empty.style.color = '#94a3b8';
                empty.textContent = 'No folders or lessons available yet.';
                container.appendChild(empty);
            } else {
                data.folders.forEach(folder => container.appendChild(renderFolderSection(folder, 0)));
            }
            if (Array.isArray(data.unassignedVideos) && data.unassignedVideos.length > 0) {
                const unassignedSection = document.createElement('div');
                unassignedSection.className = 'folder-card';
                const header = document.createElement('div');
                header.className = 'folder-header';
                const title = document.createElement('div');
                title.className = 'folder-title';
                title.textContent = `Unassigned Lessons (${data.unassignedVideos.length})`;
                const toggle = document.createElement('button');
                toggle.className = 'folder-toggle';
                toggle.textContent = 'View';
                header.appendChild(title);
                header.appendChild(toggle);
                const content = document.createElement('div');
                content.className = 'folder-content';
                content.style.display = 'none';
                const row = document.createElement('div');
                row.style.display = 'flex';
                row.style.flexWrap = 'wrap';
                row.style.gap = '1rem';
                data.unassignedVideos.forEach(v => row.appendChild(renderVideoCard(v)));
                content.appendChild(row);
                header.onclick = () => {
                    const visible = content.style.display === 'block';
                    content.style.display = visible ? 'none' : 'block';
                    toggle.textContent = visible ? 'View' : 'Hide';
                };
                unassignedSection.appendChild(header);
                unassignedSection.appendChild(content);
                container.appendChild(unassignedSection);
            }
            document.getElementById('viewsInfo').innerText = '🎬 Browse folders to find your lesson';
        }

        async function loadQuizzes() {
            const res = await apiFetch('/api/student/quizzes', { headers: { 'Authorization': `Bearer ${token}` } });
            const container = document.getElementById('quizzesList');
            const infoPanel = document.getElementById('quizInfoPanel');
            container.innerHTML = '';
            infoPanel.style.display = 'none';
            if (!res.ok) {
                const error = document.createElement('div');
                error.style.color = '#f87171';
                error.textContent = 'Unable to load quizzes. Please refresh.';
                container.appendChild(error);
                return;
            }
            const data = await res.json();
            if (Array.isArray(data.folders) && data.folders.length > 0) {
                data.folders.forEach(folder => container.appendChild(renderQuizFolderSection(folder, 0)));
            }
            if (Array.isArray(data.unassignedQuizzes) && data.unassignedQuizzes.length > 0) {
                const section = document.createElement('div');
                section.className = 'folder-card';
                const header = document.createElement('div');
                header.className = 'folder-header';
                const titleBlock = document.createElement('div');
                const title = document.createElement('div');
                title.className = 'folder-title';
                title.textContent = `Unassigned Quizzes (${data.unassignedQuizzes.length})`;
                titleBlock.appendChild(title);
                const toggle = document.createElement('button');
                toggle.className = 'folder-toggle';
                toggle.textContent = 'View';
                header.appendChild(titleBlock);
                header.appendChild(toggle);
                const content = document.createElement('div');
                content.className = 'folder-content';
                content.style.display = 'none';
                const grid = document.createElement('div');
                grid.className = 'quiz-grid';
                data.unassignedQuizzes.forEach(quiz => grid.appendChild(renderQuizCard(quiz)));
                content.appendChild(grid);
                section.appendChild(header);
                section.appendChild(content);
                header.onclick = () => {
                    const visible = content.style.display === 'block';
                    content.style.display = visible ? 'none' : 'block';
                    toggle.textContent = visible ? 'View' : 'Hide';
                };
                container.appendChild(section);
            }
            if (container.childElementCount === 0) {
                const empty = document.createElement('div');
                empty.style.color = '#94a3b8';
                empty.textContent = 'No quizzes have been added yet.';
                container.appendChild(empty);
            }
        }

        function renderQuizFolderSection(folder, level) {
            const wrapper = document.createElement('div');
            wrapper.className = 'folder-card';
            wrapper.style.paddingLeft = `${level * 14}px`;
            const header = document.createElement('div');
            header.className = 'folder-header';
            const titleBlock = document.createElement('div');
            const title = document.createElement('div');
            title.className = 'folder-title';
            title.textContent = folder.name;
            const meta = document.createElement('div');
            meta.className = 'folder-meta';
            const totalCount = (Array.isArray(folder.quizzes) ? folder.quizzes.length : 0) + (Array.isArray(folder.children) ? folder.children.length : 0);
            meta.textContent = totalCount > 0 ? `${totalCount} item${totalCount === 1 ? '' : 's'}` : 'Empty folder';
            titleBlock.appendChild(title);
            titleBlock.appendChild(meta);
            const toggle = document.createElement('button');
            toggle.className = 'folder-toggle';
            toggle.textContent = 'View';
            header.appendChild(titleBlock);
            header.appendChild(toggle);
            wrapper.appendChild(header);
            const content = document.createElement('div');
            content.className = 'folder-content';
            content.style.display = 'none';
            content.style.paddingTop = '0.75rem';
            if (Array.isArray(folder.quizzes) && folder.quizzes.length > 0) {
                const grid = document.createElement('div');
                grid.className = 'quiz-grid';
                folder.quizzes.forEach(quiz => grid.appendChild(renderQuizCard(quiz)));
                content.appendChild(grid);
            }
            if (Array.isArray(folder.children) && folder.children.length > 0) {
                folder.children.forEach(child => content.appendChild(renderQuizFolderSection(child, level + 1)));
            }
            if (content.children.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'folder-empty';
                empty.textContent = 'This folder has no quizzes yet.';
                content.appendChild(empty);
            }
            header.onclick = () => {
                const visible = content.style.display === 'block';
                content.style.display = visible ? 'none' : 'block';
                toggle.textContent = visible ? 'View' : 'Hide';
            };
            wrapper.appendChild(content);
            return wrapper;
        }

        function renderQuizCard(quiz) {
            const card = document.createElement('div');
            card.className = 'quiz-card';
            const title = document.createElement('h3');
            title.textContent = quiz.title || 'Untitled Quiz';
            const description = document.createElement('p');
            description.textContent = quiz.description ? quiz.description : 'Click to view quiz details.';
            const created = document.createElement('small');
            created.textContent = `Added ${new Date(quiz.createdAt).toLocaleDateString()}`;
            const action = document.createElement('button');
            action.type = 'button';
            action.textContent = 'View Details';
            action.onclick = () => showQuizDetails(quiz);
            card.appendChild(title);
            card.appendChild(description);
            card.appendChild(created);
            card.appendChild(action);
            return card;
        }

        function showQuizDetails(quiz) {
            const panel = document.getElementById('quizInfoPanel');
            panel.innerHTML = '';
            const heading = document.createElement('h3');
            heading.textContent = quiz.title || 'Quiz details';
            const description = document.createElement('p');
            description.textContent = quiz.description || 'No description provided.';
            const link = document.createElement('a');
            link.href = quiz.link;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.textContent = 'Start Quiz';
            const openButton = document.createElement('button');
            openButton.type = 'button';
            openButton.textContent = 'Start';
            openButton.onclick = () => window.open(quiz.link, '_blank');
            panel.appendChild(heading);
            panel.appendChild(description);
            panel.appendChild(link);
            panel.appendChild(document.createElement('br'));
            panel.appendChild(openButton);
            panel.style.display = 'block';
        }

        async function selectWatchTab() {
            document.getElementById('watchTabBtn').classList.add('active');
            document.getElementById('quizTabBtn').classList.remove('active');
            document.getElementById('watchPanel').style.display = 'block';
            document.getElementById('quizPanel').style.display = 'none';
            await loadVideos();
        }

        async function selectQuizTab() {
            document.getElementById('quizTabBtn').classList.add('active');
            document.getElementById('watchTabBtn').classList.remove('active');
            document.getElementById('watchPanel').style.display = 'none';
            document.getElementById('quizPanel').style.display = 'block';
            await loadQuizzes();
        }

        function renderVideoCard(v) {
            const card = document.createElement('div');
            card.style.width = '220px';
            card.style.background = '#071022';
            card.style.border = '1px solid #0f172a';
            card.style.borderRadius = '12px';
            card.style.padding = '0.6rem';
            card.style.display = 'flex';
            card.style.flexDirection = 'column';
            card.style.gap = '0.5rem';
            const thumb = document.createElement('img');
            thumb.style.objectFit = 'cover';
            thumb.src = `https://img.youtube.com/vi/${v.youtubeId}/hqdefault.jpg`;
            thumb.style.width = '100%';
            thumb.style.borderRadius = '8px';
            const title = document.createElement('div');
            title.style.color = '#e6eef8';
            title.style.fontWeight = '600';
            title.style.fontSize = '0.95rem';
            title.innerText = v.title || 'Untitled';
            const materials = Array.isArray(v.materials) && v.materials.length > 0 ? v.materials : (v.materialLink ? [{ title: v.materialTitle || 'Material', link: v.materialLink }] : []);
            const materialBlock = document.createElement('div');
            if (materials.length > 0) {
                materialBlock.style.display = 'flex';
                materialBlock.style.flexDirection = 'column';
                materialBlock.style.gap = '0.25rem';
                materialBlock.style.fontSize = '0.82rem';
                materialBlock.style.color = '#94a3b8';
                const label = document.createElement('div');
                label.textContent = 'Resources:';
                label.style.fontWeight = '600';
                label.style.color = '#cbd5e1';
                materialBlock.appendChild(label);
                materials.forEach(item => {
                    const link = document.createElement('a');
                    link.href = item.link;
                    link.target = '_blank';
                    link.rel = 'noopener noreferrer';
                    link.style.color = '#38bdf8';
                    link.style.textDecoration = 'none';
                    link.textContent = item.title || 'Material';
                    materialBlock.appendChild(link);
                });
            }
            const info = document.createElement('div');
            info.style.color = '#94a3b8';
            info.style.fontSize = '0.85rem';
            const assigned = allocations[v._id] || 0;
            info.innerText = assigned > 0 ? `Allocated: ${assigned} view${assigned===1?'':'s'}` : 'No allocated views';
            const btn = document.createElement('button');
            btn.className = 'btn-outline';
            btn.innerText = assigned > 0 ? 'Watch (use 1 view)' : 'No views allocated';
            btn.disabled = assigned <= 0;
            btn.onclick = () => consumeForVideo(v._id, v.title, btn, info);
            card.appendChild(thumb);
            card.appendChild(title);
            if (materials.length > 0) card.appendChild(materialBlock);
            card.appendChild(info);
            card.appendChild(btn);
            return card;
        }

        let currentPlayer = null;
        let playerReadyFn = null;
        let ytApiReady = false;
        let controlHideTimeout = null;

        function showPlayerControls() {
            const controls = document.getElementById('playerControls');
            if (!controls) return;
            controls.classList.add('visible');
            if (controlHideTimeout) clearTimeout(controlHideTimeout);
            controlHideTimeout = setTimeout(() => {
                controls.classList.remove('visible');
            }, 2200);
        }

        function hidePlayerControls() {
            const controls = document.getElementById('playerControls');
            if (!controls) return;
            controls.classList.remove('visible');
            if (controlHideTimeout) {
                clearTimeout(controlHideTimeout);
                controlHideTimeout = null;
            }
        }

        function togglePlayPause() {
            if (!currentPlayer || typeof currentPlayer.getPlayerState !== 'function') return;
            const state = currentPlayer.getPlayerState();
            if (state === YT.PlayerState.PLAYING || state === YT.PlayerState.BUFFERING) {
                currentPlayer.pauseVideo();
            } else {
                currentPlayer.playVideo();
            }
            showPlayerControls();
        }

        function onYouTubeIframeAPIReady() {
            ytApiReady = true;
        }

        function renderPlayerOverlay(embedHtml, youtubeId) {
            const container = document.getElementById('playerContainer');
            container.innerHTML = '';
            if (currentPlayer && typeof currentPlayer.destroy === 'function') {
                currentPlayer.destroy();
                currentPlayer = null;
            }
            clearSeekUpdater();
            const frameWrapper = document.createElement('div');
            frameWrapper.className = 'player-frame';
            frameWrapper.id = `youtube-player-wrapper-${Date.now()}`;

            const iframeBlocker = document.createElement('div');
            iframeBlocker.className = 'iframe-blocker';
            iframeBlocker.addEventListener('click', (event) => {
                event.stopPropagation();
                togglePlayPause();
            });

            const overlay = document.createElement('div');
            overlay.className = 'player-overlay';
            overlay.id = 'player-overlay-start';
            
            const btn = document.createElement('button');
            btn.innerText = 'Play Lesson';
            btn.onclick = () => {
                overlay.style.display = 'none';
                iframeBlocker.style.display = 'block';
                frameWrapper.innerHTML = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#fff">Loading player…</div>';
                const loadPlayer = () => {
                    if (window.YT && window.YT.Player && typeof window.YT.Player === 'function') {
                        initYoutubePlayer(youtubeId, frameWrapper);
                    } else if (ytApiReady) {
                        initYoutubePlayer(youtubeId, frameWrapper);
                    } else if (embedHtml) {
                        frameWrapper.innerHTML = embedHtml;
                    } else {
                        setTimeout(loadPlayer, 200);
                    }
                };
                loadPlayer();
            };
            overlay.appendChild(btn);
            container.appendChild(frameWrapper);
            container.appendChild(iframeBlocker);
            container.appendChild(overlay);
        }

        function initYoutubePlayer(youtubeId, container) {
            if (currentPlayer && typeof currentPlayer.destroy === 'function') {
                currentPlayer.destroy();
                currentPlayer = null;
            }
            container.innerHTML = '<div id="yt-player" style="width:100%;height:100%"></div>';
            
            currentPlayer = new YT.Player('yt-player', {
                height: '100%',
                width: '100%',
                videoId: youtubeId,
                playerVars: {
                    'controls': 1,
                    'rel': 0,
                    'modestbranding': 1,
                    'fs': 1,
                    'playsinline': 1,
                    'iv_load_policy': 3,
                    'showinfo': 0,
                    'cc_load_policy': 0,
                    'autoplay': 1,
                    'enablejsapi': 1,
                    'origin': window.location.origin
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function updateVolumeButtonLabel() {
            const btn = document.getElementById('volumeBtn');
            const slider = document.getElementById('volumeSlider');
            if (!btn || !slider || !currentPlayer || typeof currentPlayer.getVolume !== 'function' || typeof currentPlayer.isMuted !== 'function') return;
            if (currentPlayer.isMuted()) {
                btn.innerText = 'Unmute';
                slider.value = 0;
            } else {
                const volume = currentPlayer.getVolume();
                btn.innerText = `Vol ${volume}%`;
                slider.value = volume;
            }
        }

        function onPlayerReady(event) {
            console.log('YouTube player ready');
            showPlayerControls();
            updateVolumeButtonLabel();
            startSeekUpdater();
        }

        function onPlayerStateChange(event) {
            console.log('Player state:', event.data);
        }

        let seekUpdateInterval = null;

        function formatTime(seconds) {
            const sec = Math.max(0, Math.floor(seconds || 0));
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function startSeekUpdater() {
            clearSeekUpdater();
            const seekBar = document.getElementById('seekBar');
            const currentTimeLabel = document.getElementById('currentTimeLabel');
            const durationLabel = document.getElementById('durationLabel');
            if (!seekBar || !currentPlayer) return;
            seekUpdateInterval = setInterval(() => {
                if (!currentPlayer || typeof currentPlayer.getCurrentTime !== 'function' || typeof currentPlayer.getDuration !== 'function') return;
                const current = currentPlayer.getCurrentTime();
                const duration = currentPlayer.getDuration();
                if (!Number.isFinite(duration) || duration <= 0) return;
                seekBar.max = Math.floor(duration);
                seekBar.value = Math.floor(current);
                currentTimeLabel.textContent = formatTime(current);
                durationLabel.textContent = formatTime(duration);
            }, 500);
        }

        function clearSeekUpdater() {
            if (seekUpdateInterval) {
                clearInterval(seekUpdateInterval);
                seekUpdateInterval = null;
            }
        }

        document.getElementById('seekBar').addEventListener('input', function(e) {
            if (!currentPlayer || typeof currentPlayer.seekTo !== 'function') return;
            const seekValue = parseFloat(e.target.value);
            currentPlayer.seekTo(seekValue, true);
        });

        const playerWrapperEl = document.getElementById('playerWrapper');
        if (playerWrapperEl) {
            playerWrapperEl.addEventListener('mousemove', showPlayerControls);
            playerWrapperEl.addEventListener('touchstart', showPlayerControls);
            playerWrapperEl.addEventListener('mouseleave', hidePlayerControls);
        }

        // Speed control
        document.getElementById('speedControl').addEventListener('change', function(e) {
            const speed = parseFloat(e.target.value);
            if (currentPlayer && currentPlayer.setPlaybackRate) {
                currentPlayer.setPlaybackRate(speed);
                localStorage.setItem('videoSpeed', speed);
            }
        });

        // Play/pause and seek controls
        document.getElementById('playPauseBtn').addEventListener('click', function() {
            if (!currentPlayer || !currentPlayer.getPlayerState) return;
            const state = currentPlayer.getPlayerState();
            if (state === YT.PlayerState.PLAYING || state === YT.PlayerState.BUFFERING) {
                currentPlayer.pauseVideo();
            } else {
                currentPlayer.playVideo();
            }
        });

        document.getElementById('rewindBtn').addEventListener('click', function() {
            if (!currentPlayer || !currentPlayer.getCurrentTime || !currentPlayer.seekTo) return;
            const time = currentPlayer.getCurrentTime();
            currentPlayer.seekTo(Math.max(time - 10, 0), true);
        });

        document.getElementById('forwardBtn').addEventListener('click', function() {
            if (!currentPlayer || !currentPlayer.getCurrentTime || !currentPlayer.seekTo) return;
            const time = currentPlayer.getCurrentTime();
            currentPlayer.seekTo(time + 10, true);
        });

        document.getElementById('volumeBtn').addEventListener('click', function() {
            if (!currentPlayer || typeof currentPlayer.isMuted !== 'function') return;
            if (currentPlayer.isMuted()) {
                currentPlayer.unMute();
            } else {
                currentPlayer.mute();
            }
            updateVolumeButtonLabel();
            showPlayerControls();
        });

        document.getElementById('volumeSlider').addEventListener('input', function(e) {
            if (!currentPlayer || typeof currentPlayer.setVolume !== 'function' || typeof currentPlayer.isMuted !== 'function') return;
            const volume = Math.min(100, Math.max(0, parseInt(e.target.value, 10) || 0));
            currentPlayer.setVolume(volume);
            if (volume === 0) {
                currentPlayer.mute();
            } else {
                currentPlayer.unMute();
            }
            updateVolumeButtonLabel();
            showPlayerControls();
        });

        function changeVideoVolume(delta) {
            if (!currentPlayer || typeof currentPlayer.getVolume !== 'function' || typeof currentPlayer.setVolume !== 'function') return;
            const currentVolume = currentPlayer.getVolume();
            const nextVolume = Math.min(100, Math.max(0, currentVolume + delta));
            currentPlayer.setVolume(nextVolume);
            showPlayerControls();
        }

        window.addEventListener('keydown', function(e) {
            const activeTag = document.activeElement && document.activeElement.tagName;
            if (activeTag === 'INPUT' || activeTag === 'TEXTAREA' || activeTag === 'SELECT' || document.activeElement.isContentEditable) {
                return;
            }
            if (!currentPlayer) return;

            switch (e.key) {
                case 'f':
                case 'F':
                    e.preventDefault();
                    toggleFullscreen();
                    break;
                case ' ': // Spacebar
                    e.preventDefault();
                    togglePlayPause();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    if (typeof currentPlayer.getCurrentTime === 'function' && typeof currentPlayer.seekTo === 'function') {
                        currentPlayer.seekTo(Math.min((currentPlayer.getDuration() || 0), currentPlayer.getCurrentTime() + 10), true);
                    }
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    if (typeof currentPlayer.getCurrentTime === 'function' && typeof currentPlayer.seekTo === 'function') {
                        currentPlayer.seekTo(Math.max(0, currentPlayer.getCurrentTime() - 10), true);
                    }
                    break;
                default:
                    break;
            }
        });

        // Restore previous speed setting
        window.addEventListener('load', function() {
            const savedSpeed = localStorage.getItem('videoSpeed');
            if (savedSpeed) {
                document.getElementById('speedControl').value = savedSpeed;
            }
        });

        async function consumeForVideo(videoId, title, btn, infoEl) {
            if((allocations[videoId] || 0) <= 0) return alert('No views allocated for this lesson');
            btn.disabled = true; btn.innerText = 'Processing...';
            const res = await apiFetch('/api/student/consume-view-for-video', {
                method: 'POST', headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${token}` },
                body: JSON.stringify({ videoId })
            });
            const data = await res.json();
            if(!res.ok) {
                alert(data.error || 'Failed to consume view');
                btn.disabled = false; btn.innerText = 'Watch (use 1 view)';
                return;
            }
            if(data.newToken) localStorage.setItem('token', data.newToken);
            allocations[videoId] = Math.max((allocations[videoId] || 1) - 1, 0);
            const remaining = allocations[videoId];
            btn.innerText = remaining > 0 ? 'Watch (use 1 view)' : 'No views allocated';
            btn.disabled = remaining <= 0;
            document.getElementById('videoTitle').innerText = title || 'Lesson';
            document.getElementById('viewsInfo').innerText = '🎬 Views are assigned per lesson';
            infoEl.innerText = `Allocated: ${remaining} view${remaining===1?'':'s'}`;
            const materialContainer = document.getElementById('materialLinkContainer');
            if (materialContainer) {
                const materials = Array.isArray(data.video?.materials) && data.video.materials.length > 0 ? data.video.materials : (data.video?.materialLink ? [{ title: data.video.materialTitle || 'View material', link: data.video.materialLink }] : []);
                if (materials.length > 0) {
                    materialContainer.innerHTML = materials.map(item => `<div><a href="${item.link}" target="_blank" rel="noopener noreferrer">${item.title || 'View material'}</a></div>`).join('');
                } else {
                    materialContainer.innerHTML = '';
                }
            }
            // Pass youtubeId to renderPlayerOverlay
            renderPlayerOverlay(data.embedHtml, data.video?.youtubeId || '');
        }

        const changePwdBtn = document.getElementById('changePwdBtn');
        const changePwdForm = document.getElementById('changePwdForm');
        const currentPasswordInput = document.getElementById('currentPassword');
        const newPasswordInput = document.getElementById('newPassword');
        const submitChangePwdBtn = document.getElementById('submitChangePwdBtn');
        const changePwdMessage = document.getElementById('changePwdMessage');

        function showChangePwdMessage(text, isError) {
            changePwdMessage.textContent = text;
            changePwdMessage.className = isError ? 'change-password-message error' : 'change-password-message success';
        }

        document.getElementById('logoutLink').onclick = (e) => { e.preventDefault(); localStorage.clear(); window.location.href = '/'; };
        changePwdBtn.onclick = () => {
            const isOpen = changePwdForm.classList.toggle('active');
            changePwdBtn.innerText = isOpen ? 'Hide Password Form' : 'Change Password';
            if (isOpen) currentPasswordInput.focus();
        };

        submitChangePwdBtn.onclick = async () => {
            const currentPassword = currentPasswordInput.value.trim();
            const newPassword = newPasswordInput.value.trim();
            if (!currentPassword) return showChangePwdMessage('Enter your current password', true);
            if (!newPassword || newPassword.length < 4) return showChangePwdMessage('New password must have at least 4 characters', true);

            submitChangePwdBtn.disabled = true;
            submitChangePwdBtn.innerText = 'Saving...';
            showChangePwdMessage('', false);

            const res = await apiFetch('/api/auth/change-password', {
                method: 'POST',
                headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${token}` },
                body: JSON.stringify({ currentPassword, newPassword })
            });
            const data = await res.json();

            if (res.ok && data.success) {
                showChangePwdMessage('Password changed successfully', false);
                currentPasswordInput.value = '';
                newPasswordInput.value = '';
            } else {
                showChangePwdMessage(data.error || 'Failed to change password', true);
            }

            submitChangePwdBtn.disabled = false;
            submitChangePwdBtn.innerText = 'Save Password';
        };

        async function initPage() {
            document.getElementById('watchTabBtn').onclick = selectWatchTab;
            document.getElementById('quizTabBtn').onclick = selectQuizTab;
            selectWatchTab();
            await refreshStudentInfo();
            await loadVideos();
        }
        initPage();
        window.addEventListener('beforeunload', () => { if(watermarkInterval) clearInterval(watermarkInterval); });
    </script>
